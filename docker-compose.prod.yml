version: "3.8"

# Production Docker Compose Configuration
# Usage:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: brain-stroke-backend

    restart: always

    environment:
      ENVIRONMENT: production
      API_RELOAD: "false"
      MONGO_URL: ${MONGO_URL}
      DB_NAME: ${DB_NAME}

    ports:
      - "8000:8000"

    command: >
      sh -c "uvicorn apps.api.main:app
      --host 0.0.0.0
      --port ${PORT:-8000}
      --workers 4"

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: brain-stroke-frontend

    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M


volumes:
  mongodb_data: