version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: brain_stroke_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: brain_stroke_db
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain_stroke_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brain_stroke_backend
    ports:
      - "8080:8080"
    environment:
      MONGO_URL: "mongodb://root:password123@mongodb:27017/brain_stroke_db"
      DB_NAME: "brain_stroke_db"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key_here}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_change_in_production}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./apps/ai/models:/app/apps/ai/models:ro
    networks:
      - brain_stroke_network
    restart: unless-stopped
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8080

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: brain_stroke_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - brain_stroke_network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  brain_stroke_network:
    driver: bridge
